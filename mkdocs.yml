site_name: "Document Intelligence Approaches"
site_description: "Architecture and implementation approaches for Azure document intelligence and ETL workloads."
site_url: https://cloud2br-tec.github.io/ai-academy-101-docs-etl/
docs_dir: docs
use_directory_urls: false

copyright: Copyright &copy; 2026 <a href="https://github.com/Cloud2BR-TEC" target="_blank" rel="noopener">Cloud2BR TEC</a>

theme:
  name: material
  language: en
  logo: assets/img/org-logo.png
  favicon: assets/img/org-logo.png
  features:
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    scheme: default
    primary: blue
    accent: blue

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js
  - assets/js/org-link.js
  - assets/js/external-links.js

extra_css:
  - assets/css/custom.css

extra:
  generator: false

nav:
  - Home: index.md
  - 01. Fundamentals:
    - Overview: 01-fundamentals/index.md
  - 02. Approaches Catalog:
    - Overview and Decision Guide: 02-approaches/index.md
    - Invoice Processing with Document Intelligence: 02-approaches/invoice-docint.md
    - Layout Processing with Document Intelligence: 02-approaches/layout-docint.md
    - Multi-Layout Visual Cue Processing: 02-approaches/multilayout-visualcue.md
    - Invoice Processing with Open Framework: 02-approaches/invoice-openframework.md
  - 03. Enterprise Design:
    - Architecture Patterns: 03-enterprise-design/architecture-patterns.md
    - Governance and Operations: 03-enterprise-design/governance-operations.md
  - 04. Security:
    - Security and Compliance Baseline: 04-security/index.md
