<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0b1f3a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M0,0 L10,0 L5,9 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowFlow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5a6b82"/>
    </marker>
  </defs>

  <rect width="1200" height="420" rx="18" fill="url(#bg)"/>
  <text x="46" y="48" font-size="26" font-weight="700" fill="#0b1f3a">End-to-End Azure Service Flow</text>
  <text x="46" y="74" font-size="14" fill="#5a6b82">How ingestion, extraction, persistence, and operations connect across all four approaches</text>

  <!-- Card 1: Ingestion -->
  <rect x="46" y="100" width="195" height="170" rx="14" fill="#ffffff" stroke="#1f6feb" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="80" cy="132" r="16" fill="#1f6feb"/>
  <text x="80" y="136" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">IN</text>
  <text x="106" y="137" font-size="15" font-weight="700" fill="#1f6feb">Ingestion</text>
  <line x1="66" y1="150" x2="226" y2="150" stroke="#e2e8f0" stroke-width="1"/>
  <text x="66" y="172" font-size="12" fill="#33445a">Blob Storage accepts</text>
  <text x="66" y="190" font-size="12" fill="#33445a">source documents</text>

  <!-- Card 2: Trigger -->
  <rect x="271" y="100" width="195" height="170" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="305" cy="132" r="16" fill="#0f766e"/>
  <text x="305" y="136" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">TR</text>
  <text x="331" y="137" font-size="15" font-weight="700" fill="#0f766e">Trigger</text>
  <line x1="291" y1="150" x2="451" y2="150" stroke="#e2e8f0" stroke-width="1"/>
  <text x="291" y="172" font-size="12" fill="#33445a">Functions + Event Grid</text>
  <text x="291" y="190" font-size="12" fill="#33445a">react to new files</text>

  <!-- Card 3: Extraction -->
  <rect x="496" y="100" width="195" height="170" rx="14" fill="#ffffff" stroke="#8250df" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="530" cy="132" r="16" fill="#8250df"/>
  <text x="530" y="136" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">EX</text>
  <text x="556" y="137" font-size="15" font-weight="700" fill="#8250df">Extraction</text>
  <line x1="516" y1="150" x2="676" y2="150" stroke="#e2e8f0" stroke-width="1"/>
  <text x="516" y="172" font-size="12" fill="#33445a">Doc Intelligence, Vision,</text>
  <text x="516" y="190" font-size="12" fill="#33445a">Azure OpenAI parse content</text>

  <!-- Card 4: Persistence -->
  <rect x="721" y="100" width="195" height="170" rx="14" fill="#ffffff" stroke="#bc4c00" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="755" cy="132" r="16" fill="#bc4c00"/>
  <text x="755" y="136" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">PS</text>
  <text x="781" y="137" font-size="15" font-weight="700" fill="#bc4c00">Persistence</text>
  <line x1="741" y1="150" x2="901" y2="150" stroke="#e2e8f0" stroke-width="1"/>
  <text x="741" y="172" font-size="12" fill="#33445a">Cosmos DB (or SQL)</text>
  <text x="741" y="190" font-size="12" fill="#33445a">stores normalized output</text>

  <!-- Card 5: Operations -->
  <rect x="946" y="100" width="195" height="170" rx="14" fill="#ffffff" stroke="#b91c1c" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="980" cy="132" r="16" fill="#b91c1c"/>
  <text x="980" y="136" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">OP</text>
  <text x="1006" y="137" font-size="15" font-weight="700" fill="#b91c1c">Operations</text>
  <line x1="966" y1="150" x2="1126" y2="150" stroke="#e2e8f0" stroke-width="1"/>
  <text x="966" y="172" font-size="12" fill="#33445a">App Insights tracks</text>
  <text x="966" y="190" font-size="12" fill="#33445a">health and diagnostics</text>

  <!-- Flow arrows between stages -->
  <line x1="241" y1="132" x2="271" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="466" y1="132" x2="496" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="691" y1="132" x2="721" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="916" y1="132" x2="946" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Connector arrows down into identity band -->
  <line x1="144" y1="272" x2="144" y2="298" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="369" y1="272" x2="369" y2="298" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="594" y1="272" x2="594" y2="298" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="819" y1="272" x2="819" y2="298" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="1044" y1="272" x2="1044" y2="298" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Identity & access band -->
  <rect x="46" y="300" width="1108" height="90" rx="14" fill="#ffffff" stroke="#d9e2ef" filter="url(#cardShadow)"/>
  <rect x="70" y="316" width="110" height="28" rx="14" fill="#ede9fe"/>
  <text x="125" y="335" font-size="12" font-weight="700" fill="#6d28d9" text-anchor="middle">IDENTITY</text>

  <rect x="200" y="316" width="140" height="28" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="270" y="335" font-size="12" fill="#4c1d95" text-anchor="middle">Managed Identity</text>

  <rect x="352" y="316" width="154" height="28" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="429" y="335" font-size="12" fill="#4c1d95" text-anchor="middle">Microsoft Entra ID</text>

  <rect x="518" y="316" width="56" height="28" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="546" y="335" font-size="12" fill="#4c1d95" text-anchor="middle">RBAC</text>

  <text x="70" y="372" font-size="12" font-style="italic" fill="#5a6b82">Every stage authenticates via managed identity; access is scoped with least-privilege RBAC.</text>
</svg>
