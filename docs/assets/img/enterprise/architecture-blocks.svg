<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0b1f3a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M0,0 L10,0 L5,9 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowFlow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5a6b82"/>
    </marker>
  </defs>

  <rect width="1200" height="450" rx="18" fill="url(#bg)"/>
  <text x="46" y="48" font-size="26" font-weight="700" fill="#0b1f3a">Reference Architecture Blocks</text>
  <text x="46" y="74" font-size="14" fill="#5a6b82">How a document ETL pipeline is composed end-to-end, stage by stage</text>

  <!-- Block 1: Ingestion -->
  <rect x="46" y="100" width="165" height="180" rx="14" fill="#ffffff" stroke="#1f6feb" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="76" cy="132" r="15" fill="#1f6feb"/>
  <text x="76" y="136" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="98" y="136" font-size="13" font-weight="700" fill="#1f6feb">Ingestion</text>
  <line x1="64" y1="148" x2="193" y2="148" stroke="#e2e8f0" stroke-width="1"/>
  <text x="64" y="170" font-size="11" fill="#33445a">Blob Storage,</text>
  <text x="64" y="186" font-size="11" fill="#33445a">queues, triggers</text>

  <!-- Block 2: Processing -->
  <rect x="231" y="100" width="165" height="180" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="261" cy="132" r="15" fill="#0f766e"/>
  <text x="261" y="136" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="283" y="136" font-size="13" font-weight="700" fill="#0f766e">Processing</text>
  <line x1="249" y1="148" x2="378" y2="148" stroke="#e2e8f0" stroke-width="1"/>
  <text x="249" y="170" font-size="11" fill="#33445a">Functions +</text>
  <text x="249" y="186" font-size="11" fill="#33445a">extraction svc</text>

  <!-- Block 3: Intelligence -->
  <rect x="416" y="100" width="165" height="180" rx="14" fill="#ffffff" stroke="#8250df" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="446" cy="132" r="15" fill="#8250df"/>
  <text x="446" y="136" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="468" y="136" font-size="13" font-weight="700" fill="#8250df">Intelligence</text>
  <line x1="434" y1="148" x2="563" y2="148" stroke="#e2e8f0" stroke-width="1"/>
  <text x="434" y="170" font-size="11" fill="#33445a">Doc Intelligence</text>
  <text x="434" y="186" font-size="11" fill="#33445a">+ routing logic</text>

  <!-- Block 4: Normalization -->
  <rect x="601" y="100" width="165" height="180" rx="14" fill="#ffffff" stroke="#bc4c00" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="631" cy="132" r="15" fill="#bc4c00"/>
  <text x="631" y="136" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="653" y="136" font-size="13" font-weight="700" fill="#bc4c00">Normalization</text>
  <line x1="619" y1="148" x2="748" y2="148" stroke="#e2e8f0" stroke-width="1"/>
  <text x="619" y="170" font-size="11" fill="#33445a">Schema mapping +</text>
  <text x="619" y="186" font-size="11" fill="#33445a">quality checks</text>

  <!-- Block 5: Integration -->
  <rect x="786" y="100" width="165" height="180" rx="14" fill="#ffffff" stroke="#b91c1c" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="816" cy="132" r="15" fill="#b91c1c"/>
  <text x="816" y="136" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="838" y="136" font-size="13" font-weight="700" fill="#b91c1c">Integration</text>
  <line x1="804" y1="148" x2="933" y2="148" stroke="#e2e8f0" stroke-width="1"/>
  <text x="804" y="170" font-size="11" fill="#33445a">DBs, APIs,</text>
  <text x="804" y="186" font-size="11" fill="#33445a">event publish</text>

  <!-- Block 6: Observability -->
  <rect x="971" y="100" width="165" height="180" rx="14" fill="#ffffff" stroke="#334155" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="1001" cy="132" r="15" fill="#334155"/>
  <text x="1001" y="136" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
  <text x="1023" y="136" font-size="13" font-weight="700" fill="#334155">Observability</text>
  <line x1="989" y1="148" x2="1118" y2="148" stroke="#e2e8f0" stroke-width="1"/>
  <text x="989" y="170" font-size="11" fill="#33445a">Logging, metrics,</text>
  <text x="989" y="186" font-size="11" fill="#33445a">trace correlation</text>

  <!-- Flow arrows between blocks -->
  <line x1="211" y1="132" x2="231" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="396" y1="132" x2="416" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="581" y1="132" x2="601" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="766" y1="132" x2="786" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="951" y1="132" x2="971" y2="132" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <!-- Connector arrows down into cross-cutting band -->
  <line x1="129" y1="282" x2="129" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="314" y1="282" x2="314" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="499" y1="282" x2="499" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="684" y1="282" x2="684" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="869" y1="282" x2="869" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="1054" y1="282" x2="1054" y2="308" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Cross-cutting band -->
  <rect x="46" y="310" width="1108" height="110" rx="14" fill="#ffffff" stroke="#d9e2ef" filter="url(#cardShadow)"/>
  <rect x="70" y="326" width="150" height="28" rx="14" fill="#e2e8f0"/>
  <text x="145" y="345" font-size="12" font-weight="700" fill="#334155" text-anchor="middle">CROSS-CUTTING</text>

  <rect x="240" y="326" width="168" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="324" y="345" font-size="12" fill="#334155" text-anchor="middle">Resilience patterns</text>

  <rect x="422" y="326" width="168" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="506" y="345" font-size="12" fill="#334155" text-anchor="middle">Governance controls</text>

  <rect x="604" y="326" width="154" height="28" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="681" y="345" font-size="12" fill="#334155" text-anchor="middle">Security baseline</text>

  <text x="70" y="386" font-size="12" font-style="italic" fill="#5a6b82">Applied uniformly across every stage above, regardless of the chosen approach.</text>
</svg>
