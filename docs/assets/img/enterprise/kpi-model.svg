<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0b1f3a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="260" rx="16" fill="url(#bg)"/>
  <text x="40" y="34" font-size="20" font-weight="700" fill="#0b1f3a">KPI Model</text>
  <text x="40" y="56" font-size="12" fill="#5a6b82">Five signals to track health and business impact</text>

  <rect x="38" y="80" width="210" height="150" rx="14" fill="#ffffff" stroke="#1f6feb" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="68" cy="110" r="15" fill="#1f6feb"/>
  <text x="68" y="114" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="128" y="106" font-size="12" font-weight="700" fill="#1f6feb" text-anchor="middle">Precision &amp; recall</text>
  <text x="128" y="122" font-size="12" font-weight="700" fill="#1f6feb" text-anchor="middle">by family</text>
  <line x1="54" y1="136" x2="234" y2="136" stroke="#e2e8f0" stroke-width="1"/>
  <text x="128" y="158" font-size="11" fill="#33445a" text-anchor="middle">Segment by family to</text>
  <text x="128" y="174" font-size="11" fill="#33445a" text-anchor="middle">avoid hidden issues</text>

  <rect x="263" y="80" width="210" height="150" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="293" cy="110" r="15" fill="#0f766e"/>
  <text x="293" y="114" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="353" y="106" font-size="12" font-weight="700" fill="#0f766e" text-anchor="middle">End-to-end</text>
  <text x="353" y="122" font-size="12" font-weight="700" fill="#0f766e" text-anchor="middle">latency</text>
  <line x1="279" y1="136" x2="459" y2="136" stroke="#e2e8f0" stroke-width="1"/>
  <text x="353" y="158" font-size="11" fill="#33445a" text-anchor="middle">Rising values signal</text>
  <text x="353" y="174" font-size="11" fill="#33445a" text-anchor="middle">bottlenecks</text>

  <rect x="488" y="80" width="210" height="150" rx="14" fill="#ffffff" stroke="#8250df" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="518" cy="110" r="15" fill="#8250df"/>
  <text x="518" y="114" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="578" y="106" font-size="12" font-weight="700" fill="#8250df" text-anchor="middle">Auto vs human</text>
  <text x="578" y="122" font-size="12" font-weight="700" fill="#8250df" text-anchor="middle">review rate</text>
  <line x1="504" y1="136" x2="684" y2="136" stroke="#e2e8f0" stroke-width="1"/>
  <text x="578" y="158" font-size="11" fill="#33445a" text-anchor="middle">Drops signal</text>
  <text x="578" y="174" font-size="11" fill="#33445a" text-anchor="middle">template drift</text>

  <rect x="713" y="80" width="210" height="150" rx="14" fill="#ffffff" stroke="#bc4c00" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="743" cy="110" r="15" fill="#bc4c00"/>
  <text x="743" y="114" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="803" y="106" font-size="12" font-weight="700" fill="#bc4c00" text-anchor="middle">Failure rate</text>
  <text x="803" y="122" font-size="12" font-weight="700" fill="#bc4c00" text-anchor="middle">by stage</text>
  <line x1="729" y1="136" x2="909" y2="136" stroke="#e2e8f0" stroke-width="1"/>
  <text x="803" y="158" font-size="11" fill="#33445a" text-anchor="middle">Pinpoints remediation</text>
  <text x="803" y="174" font-size="11" fill="#33445a" text-anchor="middle">priorities</text>

  <rect x="938" y="80" width="210" height="150" rx="14" fill="#ffffff" stroke="#b91c1c" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="968" cy="110" r="15" fill="#b91c1c"/>
  <text x="968" y="114" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="1028" y="106" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="middle">Cost per</text>
  <text x="1028" y="122" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="middle">document</text>
  <line x1="954" y1="136" x2="1134" y2="136" stroke="#e2e8f0" stroke-width="1"/>
  <text x="1028" y="158" font-size="11" fill="#33445a" text-anchor="middle">Evaluate with quality,</text>
  <text x="1028" y="174" font-size="11" fill="#33445a" text-anchor="middle">not alone</text>
</svg>
