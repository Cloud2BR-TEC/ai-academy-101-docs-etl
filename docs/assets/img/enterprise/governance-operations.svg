<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0b1f3a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowFlow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5a6b82"/>
    </marker>
  </defs>

  <rect width="1200" height="450" rx="18" fill="url(#bg)"/>
  <text x="46" y="46" font-size="26" font-weight="700" fill="#0b1f3a">Governance &amp; Operations Model</text>
  <text x="46" y="72" font-size="14" fill="#5a6b82">A continuous cycle across every document ETL implementation</text>
  <text x="46" y="92" font-size="12" font-style="italic" fill="#5a6b82">Govern &#8594; Operate &#8594; Measure &#8594; Improve, repeated continuously</text>

  <!-- Panel 1: Govern -->
  <rect x="46" y="120" width="352" height="300" rx="16" fill="#ffffff" stroke="#6d28d9" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="76" cy="150" r="16" fill="#6d28d9"/>
  <text x="76" y="154" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">G</text>
  <text x="104" y="156" font-size="17" font-weight="700" fill="#6d28d9">Govern</text>
  <line x1="68" y1="176" x2="376" y2="176" stroke="#e2e8f0" stroke-width="1"/>

  <circle cx="72" cy="206" r="3" fill="#6d28d9"/>
  <text x="84" y="210" font-size="12" fill="#33445a">Data classification &amp; retention</text>
  <circle cx="72" cy="240" r="3" fill="#6d28d9"/>
  <text x="84" y="244" font-size="12" fill="#33445a">Least-privilege access (RBAC)</text>
  <circle cx="72" cy="274" r="3" fill="#6d28d9"/>
  <text x="84" y="278" font-size="12" fill="#33445a">Model &amp; schema version tracking</text>
  <circle cx="72" cy="308" r="3" fill="#6d28d9"/>
  <text x="84" y="312" font-size="12" fill="#33445a">Change control for routing rules</text>
  <circle cx="72" cy="342" r="3" fill="#6d28d9"/>
  <text x="84" y="346" font-size="12" fill="#33445a">Auditable extraction logs</text>

  <rect x="68" y="366" width="189" height="26" rx="13" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="162" y="383" font-size="11" fill="#4c1d95" text-anchor="middle">Reviewed every release</text>

  <!-- Panel 2: Operate -->
  <rect x="422" y="120" width="352" height="300" rx="16" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="452" cy="150" r="16" fill="#0f766e"/>
  <text x="452" y="154" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">O</text>
  <text x="480" y="156" font-size="17" font-weight="700" fill="#0f766e">Operate</text>
  <line x1="444" y1="176" x2="752" y2="176" stroke="#e2e8f0" stroke-width="1"/>

  <circle cx="448" cy="206" r="3" fill="#0f766e"/>
  <text x="460" y="210" font-size="12" fill="#33445a">Reliability: retries, fallback</text>
  <circle cx="448" cy="240" r="3" fill="#0f766e"/>
  <text x="460" y="244" font-size="12" fill="#33445a">Quality: thresholds, sampling</text>
  <circle cx="448" cy="274" r="3" fill="#0f766e"/>
  <text x="460" y="278" font-size="12" fill="#33445a">Performance: scaling, cold-start</text>
  <circle cx="448" cy="308" r="3" fill="#0f766e"/>
  <text x="460" y="312" font-size="12" fill="#33445a">Cost: lifecycle, budget alerts</text>
  <circle cx="448" cy="342" r="3" fill="#0f766e"/>
  <text x="460" y="346" font-size="12" fill="#33445a">Support: runbooks, playbooks</text>

  <rect x="444" y="366" width="140" height="26" rx="13" fill="#f0fdfa" stroke="#99f6e4"/>
  <text x="514" y="383" font-size="11" fill="#115e59" text-anchor="middle">Monitored daily</text>

  <!-- Panel 3: Measure -->
  <rect x="798" y="120" width="352" height="300" rx="16" fill="#ffffff" stroke="#b45309" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="828" cy="150" r="16" fill="#b45309"/>
  <text x="828" y="154" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">M</text>
  <text x="856" y="156" font-size="17" font-weight="700" fill="#b45309">Measure</text>
  <line x1="820" y1="176" x2="1128" y2="176" stroke="#e2e8f0" stroke-width="1"/>

  <circle cx="824" cy="206" r="3" fill="#b45309"/>
  <text x="836" y="210" font-size="12" fill="#33445a">Precision &amp; recall by family</text>
  <circle cx="824" cy="240" r="3" fill="#b45309"/>
  <text x="836" y="244" font-size="12" fill="#33445a">End-to-end processing latency</text>
  <circle cx="824" cy="274" r="3" fill="#b45309"/>
  <text x="836" y="278" font-size="12" fill="#33445a">Auto vs human review rate</text>
  <circle cx="824" cy="308" r="3" fill="#b45309"/>
  <text x="836" y="312" font-size="12" fill="#33445a">Failure rate by pipeline stage</text>
  <circle cx="824" cy="342" r="3" fill="#b45309"/>
  <text x="836" y="346" font-size="12" fill="#33445a">Cost per processed document</text>

  <rect x="820" y="366" width="175" height="26" rx="13" fill="#fffbeb" stroke="#fde68a"/>
  <text x="907" y="383" font-size="11" fill="#92400e" text-anchor="middle">Tracked continuously</text>

  <!-- Connectors between panels -->
  <line x1="400" y1="270" x2="420" y2="270" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
  <line x1="776" y1="270" x2="796" y2="270" stroke="#5a6b82" stroke-width="1.5" marker-end="url(#arrowFlow)"/>
</svg>
