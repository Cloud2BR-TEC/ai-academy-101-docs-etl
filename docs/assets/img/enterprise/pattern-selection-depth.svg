<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="380" rx="16" fill="url(#bg)"/>
  <text x="40" y="34" font-size="20" font-weight="700" fill="#0b1f3a">Pattern Selection Depth</text>
  <text x="40" y="56" font-size="12" fill="#5a6b82">Relative intensity of each dimension across the four patterns</text>

  <!-- Column headers -->
  <text x="392" y="86" font-size="11" font-weight="700" fill="#334155" text-anchor="middle">Invoice+DocInt</text>
  <text x="600" y="86" font-size="11" font-weight="700" fill="#334155" text-anchor="middle">Layout+DocInt</text>
  <text x="808" y="86" font-size="11" font-weight="700" fill="#334155" text-anchor="middle">Multi-Layout</text>
  <text x="1016" y="86" font-size="11" font-weight="700" fill="#334155" text-anchor="middle">Open Framework</text>

  <!-- Row labels -->
  <text x="50" y="125" font-size="12" fill="#33445a">Delivery speed</text>
  <text x="50" y="173" font-size="12" fill="#33445a">Template tolerance</text>
  <text x="50" y="221" font-size="12" fill="#33445a">Customization</text>
  <text x="50" y="269" font-size="12" fill="#33445a">Ops complexity</text>
  <text x="50" y="317" font-size="12" fill="#33445a">Governance burden</text>

  <!-- Row 1: Delivery speed -->
  <rect x="292" y="100" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="392" y="120" font-size="11" fill="#ffffff" text-anchor="middle">High</text>
  <rect x="500" y="100" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="600" y="120" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="708" y="100" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="808" y="120" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="916" y="100" width="200" height="30" rx="6" fill="#93c5fd"/>
  <text x="1016" y="120" font-size="11" fill="#1e3a8a" text-anchor="middle">Medium-Low</text>

  <!-- Row 2: Template tolerance -->
  <rect x="292" y="148" width="200" height="30" rx="6" fill="#93c5fd"/>
  <text x="392" y="168" font-size="11" fill="#1e3a8a" text-anchor="middle">Low-Medium</text>
  <rect x="500" y="148" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="600" y="168" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="708" y="148" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="808" y="168" font-size="11" fill="#ffffff" text-anchor="middle">High</text>
  <rect x="916" y="148" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="1016" y="168" font-size="11" fill="#ffffff" text-anchor="middle">High</text>

  <!-- Row 3: Customization -->
  <rect x="292" y="196" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="392" y="216" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="500" y="196" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="600" y="216" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="708" y="196" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="808" y="216" font-size="11" fill="#ffffff" text-anchor="middle">High</text>
  <rect x="916" y="196" width="200" height="30" rx="6" fill="#1e3a8a"/>
  <text x="1016" y="216" font-size="11" fill="#ffffff" text-anchor="middle">Very High</text>

  <!-- Row 4: Ops complexity -->
  <rect x="292" y="244" width="200" height="30" rx="6" fill="#dbeafe"/>
  <text x="392" y="264" font-size="11" fill="#1e3a8a" text-anchor="middle">Low</text>
  <rect x="500" y="244" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="600" y="264" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="708" y="244" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="808" y="264" font-size="11" fill="#ffffff" text-anchor="middle">High</text>
  <rect x="916" y="244" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="1016" y="264" font-size="11" fill="#ffffff" text-anchor="middle">High</text>

  <!-- Row 5: Governance burden -->
  <rect x="292" y="292" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="392" y="312" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="500" y="292" width="200" height="30" rx="6" fill="#60a5fa"/>
  <text x="600" y="312" font-size="11" fill="#ffffff" text-anchor="middle">Medium</text>
  <rect x="708" y="292" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="808" y="312" font-size="11" fill="#ffffff" text-anchor="middle">High</text>
  <rect x="916" y="292" width="200" height="30" rx="6" fill="#1d4ed8"/>
  <text x="1016" y="312" font-size="11" fill="#ffffff" text-anchor="middle">High</text>

  <text x="40" y="356" font-size="11" font-style="italic" fill="#5a6b82">Darker shading indicates higher intensity or complexity for that dimension.</text>
</svg>
