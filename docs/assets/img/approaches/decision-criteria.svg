<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0b1f3a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="340" rx="16" fill="url(#bg)"/>
  <text x="40" y="34" font-size="20" font-weight="700" fill="#0b1f3a">Decision Criteria at a Glance</text>
  <text x="40" y="56" font-size="12" fill="#5a6b82">Six factors that determine the right implementation pattern</text>

  <!-- Row 1 -->
  <rect x="40" y="80" width="360" height="110" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="70" cy="110" r="16" fill="#1f6feb"/>
  <text x="70" y="115" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="96" y="115" font-size="14" font-weight="700" fill="#1f6feb">Document variability</text>
  <text x="62" y="142" font-size="11" fill="#33445a">Templates, layout drift,</text>
  <text x="62" y="158" font-size="11" fill="#33445a">field position consistency</text>

  <rect x="420" y="80" width="360" height="110" rx="12" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="450" cy="110" r="16" fill="#0f766e"/>
  <text x="450" y="115" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="476" y="115" font-size="14" font-weight="700" fill="#0f766e">Accuracy target</text>
  <text x="442" y="142" font-size="11" fill="#33445a">Business tolerance for</text>
  <text x="442" y="158" font-size="11" fill="#33445a">extraction errors by field</text>

  <rect x="800" y="80" width="360" height="110" rx="12" fill="#ffffff" stroke="#8250df" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="830" cy="110" r="16" fill="#8250df"/>
  <text x="830" y="115" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="856" y="115" font-size="14" font-weight="700" fill="#8250df">Time to value</text>
  <text x="822" y="142" font-size="11" fill="#33445a">Speed required to reach</text>
  <text x="822" y="158" font-size="11" fill="#33445a">production capability</text>

  <!-- Row 2 -->
  <rect x="40" y="210" width="360" height="110" rx="12" fill="#ffffff" stroke="#bc4c00" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="70" cy="240" r="16" fill="#bc4c00"/>
  <text x="70" y="245" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="96" y="245" font-size="14" font-weight="700" fill="#bc4c00">Engineering ownership</text>
  <text x="62" y="272" font-size="11" fill="#33445a">Team capacity for custom</text>
  <text x="62" y="288" font-size="11" fill="#33445a">pipeline maintenance</text>

  <rect x="420" y="210" width="360" height="110" rx="12" fill="#ffffff" stroke="#b91c1c" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="450" cy="240" r="16" fill="#b91c1c"/>
  <text x="450" y="245" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="476" y="245" font-size="14" font-weight="700" fill="#b91c1c">Integration complexity</text>
  <text x="442" y="272" font-size="11" fill="#33445a">Number and strictness of</text>
  <text x="442" y="288" font-size="11" fill="#33445a">downstream contracts</text>

  <rect x="800" y="210" width="360" height="110" rx="12" fill="#ffffff" stroke="#334155" stroke-width="2" filter="url(#cardShadow)"/>
  <circle cx="830" cy="240" r="16" fill="#334155"/>
  <text x="830" y="245" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
  <text x="856" y="245" font-size="14" font-weight="700" fill="#334155">Compliance constraints</text>
  <text x="822" y="272" font-size="11" fill="#33445a">Data residency, audit,</text>
  <text x="822" y="288" font-size="11" fill="#33445a">and control requirements</text>
</svg>
