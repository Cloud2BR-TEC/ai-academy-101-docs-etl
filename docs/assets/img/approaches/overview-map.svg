<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0b1f3a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <path d="M0,0 L10,0 L5,9 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowFlow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1f6feb"/>
    </marker>
  </defs>

  <rect width="1200" height="580" rx="18" fill="url(#bg)"/>
  <text x="46" y="54" font-size="28" font-weight="700" fill="#0b1f3a">Document Intelligence Approaches</text>
  <text x="46" y="80" font-size="15" fill="#5a6b82">Four implementation patterns for document ETL on Azure &#8212; pick one, then apply the shared layers below</text>

  <!-- Card 1: Invoice + DocInt -->
  <rect x="46" y="110" width="254" height="190" rx="16" fill="#ffffff" stroke="#1f6feb" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="46" y="110" width="254" height="8" rx="4" fill="#1f6feb"/>
  <circle cx="86" cy="150" r="18" fill="#1f6feb"/>
  <text x="86" y="154" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">ID</text>
  <text x="68" y="194" font-size="18" font-weight="700" fill="#1f6feb">Invoice + DocInt</text>
  <line x1="68" y1="206" x2="278" y2="206" stroke="#e2e8f0" stroke-width="1"/>
  <text x="68" y="228" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">BEST FOR</text>
  <text x="68" y="248" font-size="14" fill="#33445a">Standardized invoices</text>
  <text x="68" y="274" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">CORE PATTERN</text>
  <text x="68" y="294" font-size="13" fill="#33445a">Managed invoice extraction</text>

  <!-- Card 2: Layout + DocInt -->
  <rect x="328" y="110" width="254" height="190" rx="16" fill="#ffffff" stroke="#1a7f64" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="328" y="110" width="254" height="8" rx="4" fill="#1a7f64"/>
  <circle cx="368" cy="150" r="18" fill="#1a7f64"/>
  <text x="368" y="154" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">LD</text>
  <text x="350" y="194" font-size="18" font-weight="700" fill="#1a7f64">Layout + DocInt</text>
  <line x1="350" y1="206" x2="560" y2="206" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="228" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">BEST FOR</text>
  <text x="350" y="248" font-size="14" fill="#33445a">Generic documents &amp; forms</text>
  <text x="350" y="274" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">CORE PATTERN</text>
  <text x="350" y="294" font-size="13" fill="#33445a">Generic layout extraction</text>

  <!-- Card 3: Multi-Layout Cue -->
  <rect x="610" y="110" width="254" height="190" rx="16" fill="#ffffff" stroke="#8250df" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="610" y="110" width="254" height="8" rx="4" fill="#8250df"/>
  <circle cx="650" cy="150" r="18" fill="#8250df"/>
  <text x="650" y="154" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">MC</text>
  <text x="632" y="194" font-size="18" font-weight="700" fill="#8250df">Multi-Layout Cue</text>
  <line x1="632" y1="206" x2="842" y2="206" stroke="#e2e8f0" stroke-width="1"/>
  <text x="632" y="228" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">BEST FOR</text>
  <text x="632" y="248" font-size="14" fill="#33445a">Multiple templates, cues</text>
  <text x="632" y="274" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">CORE PATTERN</text>
  <text x="632" y="294" font-size="13" fill="#33445a">Visual-cue layout routing</text>

  <!-- Card 4: Invoice + Open -->
  <rect x="892" y="110" width="254" height="190" rx="16" fill="#ffffff" stroke="#bc4c00" stroke-width="2" filter="url(#cardShadow)"/>
  <rect x="892" y="110" width="254" height="8" rx="4" fill="#bc4c00"/>
  <circle cx="932" cy="150" r="18" fill="#bc4c00"/>
  <text x="932" y="154" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">IO</text>
  <text x="914" y="194" font-size="18" font-weight="700" fill="#bc4c00">Invoice + Open</text>
  <line x1="914" y1="206" x2="1124" y2="206" stroke="#e2e8f0" stroke-width="1"/>
  <text x="914" y="228" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">BEST FOR</text>
  <text x="914" y="248" font-size="14" fill="#33445a">Custom invoice pipelines</text>
  <text x="914" y="274" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.5">CORE PATTERN</text>
  <text x="914" y="294" font-size="13" fill="#33445a">Extensible pipeline stages</text>

  <!-- Connector arrows from each approach into the shared layer panel -->
  <line x1="173" y1="302" x2="173" y2="334" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="455" y1="302" x2="455" y2="334" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="737" y1="302" x2="737" y2="334" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="1019" y1="302" x2="1019" y2="334" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Shared Enterprise Layers panel -->
  <rect x="46" y="336" width="1100" height="216" rx="14" fill="#ffffff" stroke="#d9e2ef" filter="url(#cardShadow)"/>
  <text x="70" y="370" font-size="20" font-weight="700" fill="#0b1f3a">Shared Enterprise Layers</text>
  <text x="70" y="390" font-size="12" font-style="italic" fill="#5a6b82">Applied consistently underneath every pattern above</text>

  <!-- Row 1: Flow pipeline -->
  <rect x="70" y="406" width="110" height="30" rx="15" fill="#dbeafe"/>
  <text x="125" y="425" font-size="12" font-weight="700" fill="#1f6feb" text-anchor="middle">FLOW</text>

  <rect x="196" y="406" width="120" height="30" rx="8" fill="#ffffff" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="256" y="425" font-size="12" fill="#0b1f3a" text-anchor="middle">Ingestion</text>
  <line x1="316" y1="421" x2="344" y2="421" stroke="#1f6feb" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <rect x="348" y="406" width="120" height="30" rx="8" fill="#ffffff" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="408" y="425" font-size="12" fill="#0b1f3a" text-anchor="middle">Extraction</text>
  <line x1="468" y1="421" x2="496" y2="421" stroke="#1f6feb" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <rect x="500" y="406" width="120" height="30" rx="8" fill="#ffffff" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="560" y="425" font-size="12" fill="#0b1f3a" text-anchor="middle">Validation</text>
  <line x1="620" y1="421" x2="648" y2="421" stroke="#1f6feb" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <rect x="652" y="406" width="130" height="30" rx="8" fill="#ffffff" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="717" y="425" font-size="12" fill="#0b1f3a" text-anchor="middle">Normalization</text>
  <line x1="782" y1="421" x2="810" y2="421" stroke="#1f6feb" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <rect x="814" y="406" width="120" height="30" rx="8" fill="#ffffff" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="874" y="425" font-size="12" fill="#0b1f3a" text-anchor="middle">Integration</text>
  <line x1="934" y1="421" x2="962" y2="421" stroke="#1f6feb" stroke-width="1.5" marker-end="url(#arrowFlow)"/>

  <rect x="966" y="406" width="120" height="30" rx="8" fill="#ffffff" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="1026" y="425" font-size="12" fill="#0b1f3a" text-anchor="middle">Monitoring</text>

  <!-- Row 2: Security -->
  <rect x="70" y="452" width="110" height="30" rx="15" fill="#fee2e2"/>
  <text x="125" y="471" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="middle">SECURITY</text>

  <rect x="196" y="452" width="84" height="30" rx="15" fill="#fff5f5" stroke="#f3a5a5"/>
  <text x="238" y="471" font-size="12" fill="#7a1f1f" text-anchor="middle">Entra ID</text>

  <rect x="294" y="452" width="91" height="30" rx="15" fill="#fff5f5" stroke="#f3a5a5"/>
  <text x="339" y="471" font-size="12" fill="#7a1f1f" text-anchor="middle">Key Vault</text>

  <rect x="399" y="452" width="154" height="30" rx="15" fill="#fff5f5" stroke="#f3a5a5"/>
  <text x="476" y="471" font-size="12" fill="#7a1f1f" text-anchor="middle">Private Endpoints</text>

  <rect x="567" y="452" width="84" height="30" rx="15" fill="#fff5f5" stroke="#f3a5a5"/>
  <text x="609" y="471" font-size="12" fill="#7a1f1f" text-anchor="middle">Defender</text>

  <rect x="665" y="452" width="84" height="30" rx="15" fill="#fff5f5" stroke="#f3a5a5"/>
  <text x="707" y="471" font-size="12" fill="#7a1f1f" text-anchor="middle">Sentinel</text>

  <!-- Row 3: Governance -->
  <rect x="70" y="498" width="110" height="30" rx="15" fill="#dcfce7"/>
  <text x="125" y="517" font-size="12" font-weight="700" fill="#15803d" text-anchor="middle">GOVERNANCE</text>

  <rect x="196" y="498" width="70" height="30" rx="15" fill="#f2fbf5" stroke="#a7dcb5"/>
  <text x="231" y="517" font-size="12" fill="#1c5c34" text-anchor="middle">Policy</text>

  <rect x="280" y="498" width="161" height="30" rx="15" fill="#f2fbf5" stroke="#a7dcb5"/>
  <text x="360" y="517" font-size="12" fill="#1c5c34" text-anchor="middle">Data classification</text>

  <rect x="455" y="498" width="105" height="30" rx="15" fill="#f2fbf5" stroke="#a7dcb5"/>
  <text x="507" y="517" font-size="12" fill="#1c5c34" text-anchor="middle">Audit trail</text>

  <rect x="574" y="498" width="126" height="30" rx="15" fill="#f2fbf5" stroke="#a7dcb5"/>
  <text x="637" y="517" font-size="12" fill="#1c5c34" text-anchor="middle">KPI dashboards</text>
</svg>
